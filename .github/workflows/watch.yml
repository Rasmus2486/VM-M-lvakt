name: VM straffevakt

# SELVGAANDE / ALLTID-PAA:
# Jobben kjoerer sammenhengende i ~5 timer og sjekker live-kamper hvert minutt.
# Cron fyrer ofte (selv om GitHub hopper over mange) — hver gang en kjoering
# fyres mens en annen alt kjoerer, settes den i "pending" (concurrency). Naar den
# loepende jobben er ferdig, starter den ventende UMIDDELBART. Dermed gaar det
# rundt doegnet, uavhengig av at GitHubs timeplan er upaalitelig.
#
# Krever at repoet er PUBLIC (da er Actions gratis uten minuttgrense).
on:
  schedule:
    - cron: '*/5 * * 6,7 *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Send et testvarsel til mobilen (sett til true)'
        required: false
        default: 'false'

permissions:
  contents: write

# Kun én jobb av gangen; nye kjoeringer venter i koe og tar over naar denne slutter.
concurrency:
  group: vm-straffevakt
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kjoer overvaaking
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          MAX_RUNTIME_MIN: '315'
        run: |
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            python3 monitor.py --test
          else
            python3 monitor.py --forever
          fi

      - name: Lagre state (unngaa dobbeltvarsler)
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "vm-straffevakt"
            git config user.email "actions@users.noreply.github.com"
            git add state.json
            git commit -m "Oppdater state [skip ci]"
            git pull --rebase --autostash || true
            git push || true
          fi
